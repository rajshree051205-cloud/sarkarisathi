<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarkariSaathi | सरकारी साथी</title>

   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">🇮🇳 SarkariSaathi</a>
        <div class="ml-auto">
            <button class="btn btn-outline-warning btn-sm" id="langToggle">हिंदी में देखें</button>
        </div>
    </nav>

    <div class="container mt-5" id="mainContent">

   <!-- Hero Section -->
<div class="text-center mb-5">
    <h1 class="display-4 font-weight-bold">🇮🇳 <span data-i18n="heroTitle">SarkariSaathi</span></h1>
    <p class="lead text-muted" data-i18n="heroTagline">सरकारी योजनाओं की पूरी जानकारी, एक जगह</p>
</div>

<!-- Category Cards -->
<h4 class="text-center mb-4" data-i18n="chooseCategory">अपनी category चुनें</h4>
<div class="row justify-content-center">
    <div class="col-6 col-md-3 col-lg">
    <div class="card text-center category-card" onclick="showSchemes('defence', this)">
        <div class="card-body">
            <i class="bi bi-shield-fill" style="font-size:2.5rem; color:#1a6b3c;"></i>
            <p class="mt-2 font-weight-bold" data-i18n="catDefence">Defence Families</p>
        </div>
    </div>
</div>
    <div class="col-6 col-md-3 col-lg">
        <div class="card text-center category-card" onclick="showSchemes('students', this)">
            <div class="card-body">
               <i class="bi bi-mortarboard-fill" style="font-size:2.5rem; color:#ff6600;"></i>
                <p class="mt-2 font-weight-bold" data-i18n="catStudents">Students</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3 col-lg">
        <div class="card text-center category-card" onclick="showSchemes('women', this)">
            <div class="card-body">
               <i class="bi bi-gender-female" style="font-size:2.5rem; color:#e91e8c;"></i>
                <p class="mt-2 font-weight-bold" data-i18n="catWomen">Women</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3 col-lg">
        <div class="card text-center category-card" onclick="showSchemes('farmer', this)">
            <div class="card-body">
                <i class="bi bi-flower1" style="font-size:2.5rem; color:#28a745;"></i>
                <p class="mt-2 font-weight-bold" data-i18n="catFarmer">Farmer</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3 col-lg">
        <div class="card text-center category-card" onclick="showSchemes('senior', this)">
            <div class="card-body">
              
                <!-- Senior Citizens -->
<i class="bi bi-person-check-fill" style="font-size:2.5rem; color:#6c757d;"></i>                <p class="mt-2 font-weight-bold" data-i18n="catSenior">Senior Citizens</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3 col-lg">
    <div class="card text-center category-card" onclick="showSchemes('disability', this)">
        <div class="card-body">
            <i class="bi bi-person-wheelchair" style="font-size:2.5rem; color:#007bff;"></i>
            <p class="mt-2 font-weight-bold" data-i18n="catDisability">Differently Abled</p>
        </div>
    </div>
</div>
    <div class="col-6 col-md-3 col-lg">
        <div class="card text-center category-card" onclick="showSchemes('backward', this)">
            <div class="card-body">
             <i class="bi bi-people-fill" style="font-size:2.5rem; color:#ff6600;"></i>
                <p class="mt-2 font-weight-bold" data-i18n="catBackward">Backward Classes</p>
            </div>
        </div>
    </div>
</div>



<!-- Login button — appears once a category is selected -->
<div id="loginBtnWrapper" class="text-right mb-2" style="display:none;">
    <button class="btn btn-outline-success btn-sm" id="loginBtn" data-toggle="modal" data-target="#authModal">
        <i class="bi bi-box-arrow-in-right"></i> <span data-i18n="loginBtnText">Login</span>
    </button>
</div>

<!-- Shown instead of the login button once the user is logged in -->
<div id="userStatusWrapper" class="text-right mb-2" style="display:none;">
    <span id="welcomeText" class="mr-2 font-weight-bold"></span>
    <button class="btn btn-outline-danger btn-sm" id="logoutBtn" data-i18n="logoutBtnText">Logout</button>
</div>

<!-- Schemes Section (hidden initially) -->
<div id="schemesSection" class="mt-5" style="display:none;">
</div>

<!-- Auth Modal (Login / Sign Up) -->
<div class="modal fade" id="authModal" tabindex="-1" role="dialog" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">Login</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">

        <div id="authError" class="alert alert-danger" style="display:none;"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label data-i18n="emailOrUsernameLabel">Email or Username</label>
                <input type="text" class="form-control" id="loginIdentifier" required>
            </div>
            <div class="form-group">
                <label data-i18n="passwordLabel">Password</label>
                <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-success btn-block" data-i18n="loginSubmitBtn">Login</button>
        </form>

        <p class="text-center mt-3" id="showSignupPara">
            <span data-i18n="noAccountText">Don't have an account?</span>
            <a href="#" id="showSignupLink" data-i18n="signupLinkText">Sign up</a>
        </p>

        <!-- Sign Up Form (hidden initially) -->
        <form id="signupForm" style="display:none;">
            <div class="form-group">
                <label data-i18n="usernameLabel">Username</label>
                <input type="text" class="form-control" id="signupUsername" required>
            </div>
            <div class="form-group">
                <label data-i18n="emailLabel">Email</label>
                <input type="email" class="form-control" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label data-i18n="passwordLabel">Password</label>
                <input type="password" class="form-control" id="signupPassword" required>
            </div>
            <button type="submit" class="btn btn-success btn-block" data-i18n="signupSubmitBtn">Sign Up</button>
        </form>

        <p class="text-center mt-3" id="showLoginPara" style="display:none;">
            <span data-i18n="haveAccountText">Already have an account?</span>
            <a href="#" id="showLoginLink" data-i18n="loginLinkText">Login</a>
        </p>

      </div>
    </div>
  </div>
</div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Popper -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>

</body>
</html>6
